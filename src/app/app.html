<mat-toolbar color="primary">
  <mat-icon>task</mat-icon>
  <span>Gerenciador de Tarefas</span>
</mat-toolbar>
<main class="container">
  @defer (on idle; on hover) {
    <app-task-stats />
  } @placeholder {
    <div class="statis-placeholder">Carregando...</div>
  } @error {
    <div class="statis-placeholder">Erro ao carregar estatísticas.</div>
  }
  <app-task-filters />
  <app-task-list />
</main>
